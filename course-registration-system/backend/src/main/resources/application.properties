spring.application.name=abc-university-registration

# ---- MySQL ----
# Update the username/password to match your local MySQL install.
# createDatabaseIfNotExist=true means you do NOT have to manually create
# the schema first -- Spring Boot will create "course_registration" for you.
spring.datasource.url=jdbc:mysql://localhost:3306/course_registration?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
# ddl-auto=update lets Hibernate create/update tables from the @Entity
# classes automatically, so you don't need to run schema.sql by hand.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Sample courses + a bootstrap admin account are inserted by
# config/DataSeeder.java on first boot, not by this property.
spring.sql.init.mode=never

server.port=8080
